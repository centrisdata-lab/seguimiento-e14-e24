databases:
  - name: votos-e14-e24-db
    plan: free
    databaseName: votos_e14_e24
    user: votos_user

services:
  - type: web
    name: votos-e14-e24
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 4 --threads 4 --timeout 60 --worker-class gthread
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: votos-e14-e24-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
